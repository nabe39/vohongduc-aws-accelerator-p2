# file: .github/workflows/validate.yml
name: validate
on:
  pull_request:
    paths:
      - "cloud/w9/lab/gitops/k8s/**"
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -fsSL -o kc.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kc.tgz && sudo mv kubeconform /usr/local/bin/
      - run: |
          kubeconform -strict -summary -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{ if eq .Group "" }}core{{ else }}{{ .Group }}{{ end }}/{{ .ResourceKind }}_{{ replace "/" "_" .ResourceAPIVersion }}.json' \
            cloud/w9/lab/gitops/k8s/    # validate, KHÔNG apply
