# Constraints for Lab 1.2 Gatekeeper
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sDisallowedTags
metadata:
  name: disallow-latest-tag
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  match:
    kinds:
    - apiGroups: [""]
      kinds: ["Pod"]
    excludedNamespaces:
    - "kube-system"
    - "gatekeeper-system"
    - "external-secrets"
    - "argocd"
    - "monitoring"
  parameters:
    tags:
    - "latest"
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredResources
metadata:
  name: require-resource-limits
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  match:
    kinds:
    - apiGroups: [""]
      kinds: ["Pod"]
    excludedNamespaces:
    - "kube-system"
    - "gatekeeper-system"
    - "external-secrets"
    - "argocd"
    - "monitoring"
  parameters:
    limits:
    - cpu
    - memory
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPAllowedUsers
metadata:
  name: disallow-root-user
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  match:
    kinds:
    - apiGroups: [""]
      kinds: ["Pod"]
    excludedNamespaces:
    - "kube-system"
    - "gatekeeper-system"
    - "external-secrets"
    - "argocd"
    - "monitoring"
  parameters:
    runAsUser:
      rule: MustRunAsNonRoot
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPHostNetworkingPorts
metadata:
  name: disallow-host-network
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  match:
    kinds:
    - apiGroups: [""]
      kinds: ["Pod"]
    excludedNamespaces:
    - "kube-system"
    - "gatekeeper-system"
    - "external-secrets"
    - "argocd"
    - "monitoring"
  parameters:
    hostNetwork: false
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sReplicaLimits
metadata:
  name: replica-limits
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  match:
    kinds:
    - apiGroups: ["apps"]
      kinds: ["Deployment"]
    excludedNamespaces:
    - "kube-system"
    - "gatekeeper-system"
    - "external-secrets"
    - "argocd"
    - "monitoring"
  parameters:
    ranges:
    - min_replicas: 1
      max_replicas: 5
