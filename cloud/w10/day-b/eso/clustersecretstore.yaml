apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1 # Thay thế bằng AWS Region của bạn
      auth:
        # Sử dụng IRSA (IAM Roles for Service Accounts) để xác thực an toàn không dùng credentials tĩnh
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
