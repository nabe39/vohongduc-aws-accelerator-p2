apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-servicemonitor
  namespace: demo
  labels:                           # <--- BẮT BUỘC PHẢI THÊM KHỐI NÀY
    release: kube-prometheus-stack  # <--- Nhãn chìa khóa để thông cửa Prometheus
spec:
  selector:
    matchLabels:
      app: api                      # <--- Phải khớp 100% với nhãn (Labels) của Service "api"
  endpoints:
    - port: http                    # Tên port được định nghĩa trong Service web
      path: /metrics
      interval: 15s