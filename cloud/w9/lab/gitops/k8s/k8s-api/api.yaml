# file: k8s-api/api.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout            # argoproj.io/v1alpha1
metadata: { name: api, namespace: demo, labels: { app: api } }
spec:
  replicas: 4
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      containers:
      - name: api
        image: w9-api:1
        imagePullPolicy: IfNotPresent
        ports: [ { name: http, containerPort: 8080 } ]
        env:
        - { name: ERROR_RATE, value: "0" }
        - { name: VERSION,    value: "v1" }
        readinessProbe: { httpGet: { path: /healthz, port: 8080 } }
  strategy:
    canary:
      analysis:
        templates:
        - templateName: api-success-rate
      steps:
      - setWeight: 25
      - pause: { duration: 1m }
      - setWeight: 50
      - pause: { duration: 1m }
      - setWeight: 100
#Service api (port http 8080) ở cùng file
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
  - name: http
    port: 8080
    targetPort: 8080